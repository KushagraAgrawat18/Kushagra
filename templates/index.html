<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bangalore Property Estimator</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
    background:#0f172a;
    height:100vh;
    overflow:hidden;
}

/* MAP */
#map{
    position:absolute;
    width:100%;
    height:100%;
    z-index:0;
}

/* BIG LOCATION TEXT */
#areaName{
    position:absolute;
    bottom:60px;
    left:60px;
    font-size:55px;
    font-weight:900;
    color:rgba(255,255,255,0.08);
    letter-spacing:4px;
    z-index:1;
}

/* CARD */
.glass-card{
    position:absolute;
    right:60px;
    top:50%;
    transform:translateY(-50%);
    width:420px;
    max-height:90vh;
    overflow:auto;
    padding:35px;
    background:rgba(10,15,25,0.95);
    border-radius:18px;
    box-shadow:0 25px 80px rgba(0,0,0,0.8);
    z-index:3;
}

/* PARTICLE CANVAS */
#particleCanvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

.glass-card *{
    position:relative;
    z-index:2;
}

h1{
    color:white;
    margin-bottom:25px;
}

label{
    color:#9ca3af;
    font-size:13px;
}

select,input{
    width:100%;
    padding:12px;
    margin:8px 0 18px 0;
    border-radius:8px;
    border:1px solid #1f2937;
    background:#111827;
    color:white;
}

select:focus,input:focus{
    outline:none;
    border-color:#16a34a;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#16a34a;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}

.result{
    margin-top:15px;
    padding:12px;
    background:#1f2937;
    border-radius:8px;
    color:white;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="areaName">BANGALORE</div>

<div class="glass-card">

<canvas id="particleCanvas"></canvas>

<h1>Property Estimator</h1>

<form action="/predict" method="post">

<label>Interactive Prime Area</label>
<select id="interactiveSelect">
<option value="none">None</option>
<option value="Indiranagar">Indiranagar</option>
<option value="Whitefield">Whitefield</option>
<option value="Electronic City">Electronic City</option>
<option value="HSR Layout">HSR Layout</option>
</select>

<label>All Dataset Locations</label>
<select name="location">
<option value="none">None</option>
{% for location in locations %}
{% if location not in ['Indiranagar','Whitefield','Electronic City','HSR Layout'] %}
<option value="{{ location }}">{{ location }}</option>
{% endif %}
{% endfor %}
</select>

<label>Total Square Feet</label>
<input type="number" name="sqft" required>

<label>Bathrooms</label>
<input type="number" name="bath" required>

<label>BHK</label>
<input type="number" name="bhk" required>

<button type="submit">Estimate Price</button>
</form>

{% if prediction_text %}
<div class="result">
{{ prediction_text }}
</div>
{% endif %}

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// MAP
var map = L.map('map').setView([12.9716,77.5946],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var highlight;
var coords = {
"Indiranagar":[12.9719,77.6412],
"Whitefield":[12.9698,77.7499],
"Electronic City":[12.8456,77.6603],
"HSR Layout":[12.9116,77.6474]
};

document.getElementById("interactiveSelect").addEventListener("change",function(){
if(coords[this.value]){
map.flyTo(coords[this.value],15,{duration:1.6});
if(highlight) map.removeLayer(highlight);
highlight = L.circle(coords[this.value],{
color:'#16a34a',
fillOpacity:0,
weight:4,
radius:1500
}).addTo(map);
document.getElementById("areaName").innerText=this.value.toUpperCase();
}
});

// PARTICLES
const canvas=document.getElementById("particleCanvas");
const ctx=canvas.getContext("2d");
canvas.width=canvas.offsetWidth;
canvas.height=canvas.offsetHeight;

let particles=[];
for(let i=0;i<35;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
dx:(Math.random()-0.5)*0.5,
dy:(Math.random()-0.5)*0.5,
size:2
});
}

let mouse={x:null,y:null};

canvas.addEventListener("mousemove",function(e){
let rect=canvas.getBoundingClientRect();
mouse.x=e.clientX-rect.left;
mouse.y=e.clientY-rect.top;
});

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.dx;
p.y+=p.dy;
if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

if(mouse.x){
let dx=mouse.x-p.x;
let dy=mouse.y-p.y;
let dist=Math.sqrt(dx*dx+dy*dy);
if(dist<80){
ctx.beginPath();
ctx.strokeStyle="rgba(22,163,74,0.3)";
ctx.moveTo(p.x,p.y);
ctx.lineTo(mouse.x,mouse.y);
ctx.stroke();
}
}

ctx.beginPath();
ctx.fillStyle="rgba(22,163,74,0.8)";
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
